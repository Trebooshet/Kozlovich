<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kozlovich" />
  <title>Kozlovich</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
</head>
<body>

<div class="app">

  <!-- Экран разрешения компаса (только iOS) -->
  <div id="screen-compass" class="screen hidden">
    <div class="screen-icon">🧭</div>
    <h2>Нужен доступ к компасу</h2>
    <p>Для определения направления требуется разрешение на использование датчика ориентации</p>
    <button id="enableCompass" class="btn-primary">Разрешить компас</button>
  </div>

  <!-- Главный экран -->
  <div id="screen-main" class="screen">

    <div class="status-bar">
      <div id="gps-status" class="status-dot">
        <span class="dot"></span>
        <span class="label">GPS</span>
      </div>
      <div id="compass-status" class="status-dot">
        <span class="dot"></span>
        <span class="label">Компас</span>
      </div>
      <div id="accuracy-label">—</div>
    </div>

    <!-- Компас + стрелка -->
    <div id="arrow-container" class="hidden">

      <div id="compass-wrap">
        <!-- Внешнее кольцо с румбами — вращается вместе с устройством (показывает север) -->
        <div id="compass-ring">
          <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
            <!-- Круг -->
            <circle cx="120" cy="120" r="115" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
            <!-- Деления каждые 30° -->
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(30  120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(60  120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(90  120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(120 120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(150 120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(180 120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(210 120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(240 120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(270 120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(300 120 120)"/>
            <line x1="120" y1="6"  x2="120" y2="18"  stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="rotate(330 120 120)"/>
            <!-- Главные румбы -->
            <text x="120" y="22" text-anchor="middle" fill="#ff4444" font-size="16" font-weight="800" font-family="sans-serif">N</text>
            <text x="120" y="232" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="13" font-weight="600" font-family="sans-serif">S</text>
            <text x="232" y="125" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="13" font-weight="600" font-family="sans-serif">E</text>
            <text x="8"   y="125" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="13" font-weight="600" font-family="sans-serif">W</text>
          </svg>
        </div>

        <!-- Стрелка — вращается отдельно (показывает на цель) -->
        <div id="arrow-wrap">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Только наконечник — чистая белая стрелка вверх -->
            <polygon points="50,6 65,52 50,44 35,52" fill="white"/>
            <!-- Тело стрелки -->
            <rect x="46" y="44" width="8" height="46" rx="4" fill="white"/>
          </svg>
        </div>
      </div>

      <div id="distance-display">
        <span id="distance-value">0</span>
        <span id="distance-unit">м</span>
      </div>
      <div id="coords-display"></div>
    </div>

    <!-- Нет точки -->
    <div id="no-point">
      <div class="no-point-icon">📍</div>
      <p>Нажмите кнопку чтобы<br/>поставить точку</p>
    </div>

    <div class="controls">
      <button id="setPoint" class="btn-primary">
        <span id="btn-icon">📍</span>
        <span id="btn-text">Поставить точку</span>
      </button>
      <button id="clearPoint" class="btn-secondary hidden">Сбросить точку</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
